<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <title>Analog Clock</title>
    <meta name="description" content="A beautiful, minimal analog clock built with HTML, CSS, and JavaScript.">
    <meta name="author" content="Vaibhav Chauhan">

    <!-- Open Graph / Social sharing -->
    <meta property="og:title" content="Analog Clock">
    <meta property="og:description" content="A beautiful, minimal analog clock built with HTML, CSS, and JavaScript.">
    <meta property="og:type" content="website">

    <!-- Browser theme color -->
    <meta name="theme-color" content="#353232">

    <!-- Favicon (emoji fallback — no extra file needed) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕐</text></svg>">

    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="clock">

            <div style="--clr:#ff3d58; --h:70px" id="hour" class="hand"><i></i></div>
            <div style="--clr:#00a6ff; --h:80px" id="min" class="hand"><i></i></div>
            <div style="--clr:#ffff; --h:90px" id="sec" class="hand"><i></i></div>

            <span style="--i:1;"><b>1</b></span>
            <span style="--i:2;"><b>2</b></span>
            <span style="--i:3;"><b>3</b></span>
            <span style="--i:4;"><b>4</b></span>
            <span style="--i:5;"><b>5</b></span>
            <span style="--i:6;"><b>6</b></span>
            <span style="--i:7;"><b>7</b></span>
            <span style="--i:8;"><b>8</b></span>
            <span style="--i:9;"><b>9</b></span>
            <span style="--i:10;"><b>10</b></span>
            <span style="--i:11;"><b>11</b></span>
            <span style="--i:12;"><b>12</b></span>
        </div>
    </div>
    
    <script src="script.js"></script>    
</body>
</html>
